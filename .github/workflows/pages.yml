name: Deploy Flood Dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pandas pyarrow shapely

      - name: Export parquet data for the dashboard
        run: |
          python Map_Visualization/Backend/export_parquet_to_json.py \
            --input Data_Cleaning/groundsource_2026.parquet \
            --output Map_Visualization/Frontend/public/data/events.geojson \
            --us-only \
            --limit 5000

      - name: Install frontend dependencies
        working-directory: Map_Visualization/Frontend
        run: npm install

      - name: Build frontend
        working-directory: Map_Visualization/Frontend
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Map_Visualization/Frontend/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
